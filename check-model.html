<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 3 模型检查</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #0a0c12 0%, #1a1b23 100%);
      color: #e6e6e6;
      min-height: 100vh;
    }

    h1 {
      color: #4a9eff;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .info {
      background: linear-gradient(135deg, rgba(74, 158, 255, 0.15), rgba(143, 122, 255, 0.15));
      border: 1px solid rgba(74, 158, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }

    .info p {
      margin: 8px 0;
      font-size: 15px;
    }

    button {
      background: linear-gradient(135deg, #4a9eff 0%, #8f7aff 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin: 10px 10px 10px 0;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 158, 255, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      white-space: pre-wrap;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .error {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border-left: 3px solid #ff6b6b;
    }

    .success {
      color: #4caf50;
      background: rgba(76, 175, 80, 0.1);
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border-left: 3px solid #4caf50;
    }

    .info-msg {
      color: #4a9eff;
      background: rgba(74, 158, 255, 0.1);
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border-left: 3px solid #4a9eff;
    }

    #model-canvas {
      margin-top: 20px;
      border-radius: 12px;
      border: 2px solid rgba(74, 158, 255, 0.3);
      display: block;
      max-width: 100%;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>🔍 Quest 3 模型检查工具</h1>

  <div class="info">
    <p><strong>📦 模型文件：</strong>Quest3.glb</p>
    <p><strong>📍 位置：</strong>/models/Quest3.glb</p>
    <p><strong>💾 大小：</strong>8.2 MB</p>
    <p><strong>📝 说明：</strong>此页面将分析模型的部件数量、材质、纹理等信息</p>
  </div>

  <button id="check-btn">🔍 检查模型结构</button>
  <button id="test-btn">🧪 测试加载并显示</button>
  <button id="debug-btn">🐛 调试信息</button>

  <div id="result"></div>
  <canvas id="model-canvas" style="display: none;"></canvas>

  <script type="module">
    import * as THREE from './vendor/three.module.js?v=1783166735';

    // 动态导入 GLTFLoader（与 main.js 相同的方式）
    let GLTFLoader = null;
    async function loadGLTFLoader() {
      if (!GLTFLoader) {
        const module = await import('./vendor/GLTFLoader.js?v=1783166735');
        GLTFLoader = module.GLTFLoader;
      }
      return GLTFLoader;
    }

    const result = document.getElementById('result');
    const checkBtn = document.getElementById('check-btn');
    const testBtn = document.getElementById('test-btn');
    const debugBtn = document.getElementById('debug-btn');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.textContent = msg;
      div.className = type;
      result.appendChild(div);
      // 自动滚动到底部
      result.scrollTop = result.scrollHeight;
    }

    function clear() {
      result.innerHTML = '';
    }

    // 调试信息
    debugBtn.addEventListener('click', () => {
      clear();
      log('🐛 调试信息\n');

      // 检查环境
      log('📊 浏览器环境:');
      log(`   User Agent: ${navigator.userAgent.substring(0, 80)}...`);
      log(`   Platform: ${navigator.platform}`);
      log(`   Language: ${navigator.language}`);

      // 检查 ES Module 支持
      log('\n📦 ES Module 支持:');
      log(`   支持: ${'noModule' in HTMLScriptElement.prototype ? '✅' : '❌'}`);

      // 检查 Import Map
      log('\n🗺️ Import Map:');
      const importMaps = document.querySelectorAll('link[rel="importmap"]');
      log(`   数量: ${importMaps.length}`);
      importMaps.forEach((map, i) => {
        log(`   Map ${i}: ${map.getAttribute('href') || '内联'}`);
      });

      // 检查 Three.js
      log('\n🎨 Three.js:');
      try {
        import('./vendor/three.module.js').then(mod => {
          log(`   ✅ 版本: ${mod.REVISION}`);
          log(`   THREE 对象: ${typeof mod}`);
        }).catch(err => {
          log(`   ❌ 加载失败: ${err.message}`, 'error');
        });
      } catch (err) {
        log(`   ❌ 错误: ${err.message}`, 'error');
      }

      // 检查 GLTFLoader
      log('\n🔧 GLTFLoader:');
      loadGLTFLoader().then(LoaderClass => {
        log(`   ✅ 已加载`);
        log(`   类型: ${LoaderClass.name}`);
        log(`   方法: ${Object.getOwnPropertyNames(LoaderClass.prototype).join(', ')}`);
      }).catch(err => {
        log(`   ❌ 加载失败: ${err.message}`, 'error');
      });

      // 检查模型文件
      log('\n📁 模型文件:');
      fetch('./models/Quest3.glb', { method: 'HEAD' })
        .then(resp => {
          log(`   ✅ 可访问`);
          log(`   状态: ${resp.status} ${resp.statusText}`);
          log(`   大小: ${resp.headers.get('Content-Length')} bytes`);
          return resp.blob();
        })
        .then(blob => {
          log(`   MIME 类型: ${blob.type}`);
          log(`   实际大小: ${(blob.size / 1024 / 1024).toFixed(2)} MB`);
        })
        .catch(err => {
          log(`   ❌ 无法访问: ${err.message}`, 'error');
        });
    });

    // 检查模型结构
    checkBtn.addEventListener('click', async () => {
      clear();
      log('🔍 开始检查 Quest3.glb 模型...\n');

      try {
        // 步骤 1: 加载文件
        log('📡 正在请求 ./models/Quest3.glb ...');
        const response = await fetch('./models/Quest3.glb');

        if (!response.ok) {
          throw new Error(`HTTP 错误！状态码: ${response.status} ${response.statusText}`);
        }

        const arrayBuffer = await response.arrayBuffer();

        log(`✅ 文件加载成功`);
        log(`   大小: ${(arrayBuffer.byteLength / 1024 / 1024).toFixed(2)} MB`);
        log(`   类型: ${arrayBuffer.constructor.name}\n`);

        // 步骤 2: 加载 GLTFLoader
        log('🔧 正在加载 GLTFLoader...');
        const LoaderClass = await loadGLTFLoader();
        const loader = new LoaderClass();
        log(`✅ GLTFLoader 已就绪 (${loader.constructor.name})\n`);

        // 步骤 3: 解析 GLB
        log('🔍 正在解析 GLB 文件...');
        const gltf = await new Promise((resolve, reject) => {
          // 设置超时
          const timeout = setTimeout(() => {
            reject(new Error('解析超时（超过 30 秒）'));
          }, 30000);

          loader.parse(arrayBuffer, '', (result) => {
            clearTimeout(timeout);
            resolve(result);
          }, (err) => {
            clearTimeout(timeout);
            reject(new Error('GLTFLoader.parse 失败: ' + (err?.message || err)));
          });
        });

        log('✅ GLB 解析成功\n');

        const scene = gltf.scene;

        // 统计信息
        let meshCount = 0;
        let materialCount = 0;
        let textureCount = 0;
        const meshNames = [];
        const materials = new Set();

        scene.traverse((child) => {
          if (child.isMesh) {
            meshCount++;
            meshNames.push(child.name || child.type || '未命名');
            if (child.material) {
              materials.add(child.material.type || '未知材质');
              if (child.material.map) textureCount++;
            }
          }
        });

        log(`📊 模型统计:`);
        log(`   网格数量: ${meshCount}`);
        log(`   材质类型: ${Array.from(materials).join(', ')}`);
        log(`   纹理贴图: ${textureCount}`);
        log(`   场景名称: ${scene.name || '未命名'}\n`);

        log(`📦 主要部件:`);
        meshNames.slice(0, 20).forEach((name, i) => {
          log(`   ${i + 1}. ${name || '未命名'}`);
        });

        if (meshNames.length > 20) {
          log(`   ... 还有 ${meshNames.length - 20} 个部件`);
        }

        // 计算包围盒
        const box = new THREE.Box3().setFromObject(scene);
        const size = new THREE.Vector3();
        box.getSize(size);

        log(`\n📐 模型尺寸:`);
        log(`   宽: ${size.x.toFixed(2)}`);
        log(`   高: ${size.y.toFixed(2)}`);
        log(`   深: ${size.z.toFixed(2)}`);

        log(`\n✅ 检查完成！`);
        log(`   这个模型有 ${meshCount} 个独立网格`);
        log(`   可以用作爆炸图的基础`);

      } catch (err) {
        log(`\n❌ 检查过程出错:`, 'error');
        log(`   类型: ${err.constructor.name}`, 'error');
        log(`   消息: ${err.message}`, 'error');
        if (err.stack) {
          log(`\n堆栈跟踪:`, 'error');
          const stackLines = err.stack.split('\n');
          stackLines.slice(0, 10).forEach(line => log('   ' + line, 'error'));
        }
        console.error('详细错误:', err);
      }
    });

    // 测试加载和显示
    testBtn.addEventListener('click', async () => {
      clear();
      log('🧪 测试加载 Quest 3 模型...\n');

      try {
        const response = await fetch('./models/Quest3.glb');
        const arrayBuffer = await response.arrayBuffer();

        log('✅ 文件加载成功');

        // 动态加载 GLTFLoader
        const LoaderClass = await loadGLTFLoader();
        const loader = new LoaderClass();

        const gltf = await new Promise((resolve, reject) => {
          loader.parse(arrayBuffer, '', resolve, (err) => reject(new Error('解析失败：' + err.message)));
        });

        log('✅ GLB 解析成功');
        log(`   场景包含 ${gltf.scene.children.length} 个子对象\n`);

        // 创建展示区域
        log('🎨 创建 3D 展示...');
        clear(); // 清除之前的文字

        // 添加标题
        const title = document.createElement('div');
        title.style.cssText = 'color: #4a9eff; font-size: 18px; font-weight: bold; margin-bottom: 15px;';
        title.textContent = '🎮 Quest 3 模型预览';
        result.appendChild(title);

        // 创建 canvas 容器
        const canvasContainer = document.createElement('div');
        canvasContainer.id = 'canvas-container';
        canvasContainer.style.cssText = `
          position: relative;
          width: 100%;
          max-width: 800px;
          height: 500px;
          margin: 20px auto;
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 10px 40px rgba(0,0,0,0.5);
          border: 2px solid rgba(74, 158, 255, 0.3);
        `;
        result.appendChild(canvasContainer);

        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0c12);

        // 相机 (16:9 宽高比)
        const aspect = 16 / 9;
        const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
        camera.position.set(3, 2, 3);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(800, 450); // 固定尺寸确保渲染
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        canvasContainer.appendChild(renderer.domElement);

        // 控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        // 灯光
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const dir = new THREE.DirectionalLight(0xffffff, 1);
        dir.position.set(5, 10, 7);
        dir.castShadow = true;
        scene.add(dir);

        // 添加模型
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        box.getCenter(center);
        model.position.sub(center);
        scene.add(model);

        // 调整相机距离
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
        camera.position.set(dist * 1.5, dist * 1, dist * 1.5);
        controls.target.set(0, 0, 0);
        controls.update();

        log('✅ 模型已添加到场景');
        log('   渲染器正在运行...\n');

        // 动画循环
        function animate() {
          requestAnimationFrame(animate);
          model.rotation.y += 0.005;
          controls.update(); // 更新控制器状态（阻尼效果）
          renderer.render(scene, camera);
        }
        animate();

        log('✨ 模型展示窗口已打开');
        log('   你可以看到一个旋转的 Quest 3 模型');
        log('   关闭此窗口返回检查\n');

      } catch (err) {
        log(`\n❌ 测试加载失败:`, 'error');
        log(`   类型: ${err.constructor.name}`, 'error');
        log(`   消息: ${err.message}`, 'error');
        if (err.stack) {
          log(`\n堆栈跟踪:`, 'error');
          const stackLines = err.stack.split('\n');
          stackLines.slice(0, 10).forEach(line => log('   ' + line, 'error'));
        }
        console.error('详细错误:', err);
      }
    });
  </script>
</body>
</html>
