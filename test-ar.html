<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR жЁЎејҸеҝ«йҖҹжөӢиҜ•</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0c12 0%, #1a1b23 100%);
      color: #e6e6e6;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      color: #4a9eff;
      margin-bottom: 20px;
      text-align: center;
    }
    .test-section {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
      border-left: 3px solid #4a9eff;
    }
    .test-item {
      margin: 10px 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status {
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    .status.pass { background: #4caf50; color: white; }
    .status.fail { background: #ff6b6b; color: white; }
    .status.pending { background: #ffc107; color: black; }
    button {
      background: linear-gradient(135deg, #4a9eff, #8f7aff);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin: 5px 0;
      transition: opacity 0.3s;
    }
    button:hover { opacity: 0.9; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .ar-btn {
      background: linear-gradient(135deg, #00d4aa, #00b894);
      font-size: 16px;
      padding: 15px 30px;
      margin-top: 20px;
    }
    .info {
      background: rgba(74, 158, 255, 0.1);
      border-left: 3px solid #4a9eff;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .warn {
      background: rgba(255, 193, 7, 0.1);
      border-left: 3px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .error {
      background: rgba(255, 107, 107, 0.1);
      border-left: 3px solid #ff6b6b;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .success {
      background: rgba(76, 175, 80, 0.1);
      border-left: 3px solid #4caf50;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    #log {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .log-entry { margin: 3px 0; }
    .log-success { color: #4caf50; }
    .log-error { color: #ff6b6b; }
    .log-warn { color: #ffc107; }
    .log-info { color: #4a9eff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>рҹ§Ә AR жЁЎејҸжөӢиҜ•</h1>

    <div class="info">
      <strong>рҹ“ұ и®ҫеӨҮиҰҒжұӮпјҡ</strong><br>
      вҖў Android Chrome 79+<br>
      вҖў iOS Safari 15+<br>
      вҖў вқҢ жЎҢйқўжөҸи§ҲеҷЁдёҚж”ҜжҢҒ
    </div>

    <div class="warn">
      <strong>вҡ пёҸ  йҮҚиҰҒпјҡ</strong><br>
      еҝ…йЎ»дҪҝз”Ё <strong>HTTPS</strong> и®ҝй—®пјҒ<br>
      жң¬йЎөйқўйҖҡиҝҮ Vercel иҮӘеҠЁжҸҗдҫӣ HTTPSгҖӮ
    </div>

    <button onclick="runAllTests()">рҹ”Қ иҝҗиЎҢжүҖжңүжөӢиҜ•</button>
    <button onclick="openMainApp()">рҹҺ® жү“ејҖдё»зЁӢеәҸ</button>

    <div class="test-section">
      <h3>рҹ“Ҡ жөӢиҜ•з»“жһң</h3>
      <div id="test-results"></div>
    </div>

    <div id="log"></div>
  </div>

  <script type="module">
    import * as THREE from './vendor/three.module.js';

    const logDiv = document.getElementById('log');
    const resultsDiv = document.getElementById('test-results');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log-entry log-${type}`;
      const time = new Date().toLocaleTimeString();
      div.textContent = `[${time}] ${msg}`;
      logDiv.appendChild(div);
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    function clearLog() {
      logDiv.innerHTML = '';
    }

    function addResult(name, status, message = '') {
      const div = document.createElement('div');
      div.className = 'test-item';
      div.innerHTML = `
        <span>${name}</span>
        <span class="status ${status}">${status === 'pass' ? 'вң…' : status === 'fail' ? 'вқҢ' : 'вҸі'} ${status === 'pass' ? 'йҖҡиҝҮ' : status === 'fail' ? 'еӨұиҙҘ' : 'еҫ…жөӢ'}</span>
      `;
      if (message) {
        div.title = message;
      }
      resultsDiv.appendChild(div);
    }

    function clearResults() {
      resultsDiv.innerHTML = '';
    }

    // жөӢиҜ• 1: WebXR API ж”ҜжҢҒ
    window.testWebXR = async function() {
      clearResults();
      log('рҹ§Ә ејҖе§Ӣ AR еҠҹиғҪжөӢиҜ•...\n');

      // жөӢиҜ• 1: WebXR API
      log('1пёҸвғЈ  жЈҖжөӢ WebXR API...');
      const hasWebXR = 'xr' in navigator;
      addResult('WebXR API', hasWebXR ? 'pass' : 'fail',
        hasWebXR ? 'жөҸи§ҲеҷЁж”ҜжҢҒ WebXR' : 'жөҸи§ҲеҷЁдёҚж”ҜжҢҒ WebXR');
      log(`   ${hasWebXR ? 'вң…' : 'вқҢ'} WebXR API: ${hasWebXR}`);

      if (!hasWebXR) {
        log('   вқҢ жөҸи§ҲеҷЁдёҚж”ҜжҢҒ WebXRпјҢиҜ·дҪҝз”Ёпјҡ', 'error');
        log('   вҖў Android: Chrome 79+', 'error');
        log('   вҖў iOS: Safari 15+', 'error');
        return;
      }

      // жөӢиҜ• 2: AR дјҡиҜқж”ҜжҢҒ
      log('\n2пёҸвғЈ  жЈҖжөӢ AR дјҡиҜқж”ҜжҢҒ...');
      let arSupported = false;
      try {
        arSupported = await navigator.xr.isSessionSupported('immersive-ar');
        addResult('AR дјҡиҜқж”ҜжҢҒ', arSupported ? 'pass' : 'fail',
          arSupported ? 'и®ҫеӨҮж”ҜжҢҒ AR' : 'и®ҫеӨҮдёҚж”ҜжҢҒ AR');
        log(`   ${arSupported ? 'вң…' : 'вқҢ'} AR supported: ${arSupported}`);
      } catch (err) {
        addResult('AR дјҡиҜқж”ҜжҢҒ', 'fail', err.message);
        log(`   вқҢ жЈҖжөӢеӨұиҙҘ: ${err.message}`, 'error');
      }

      if (!arSupported) {
        log('   вқҢ и®ҫеӨҮдёҚж”ҜжҢҒ ARпјҢиҜ·дҪҝз”Ёпјҡ', 'error');
        log('   вҖў Android 7+ + Chrome 79+', 'error');
        log('   вҖў iOS 15+ + Safari', 'error');
        log('   вҖў еҝ…йЎ»дҪҝз”Ё HTTPS', 'error');
        return;
      }

      // жөӢиҜ• 3: HTTPS
      log('\n3пёҸвғЈ  жЈҖжөӢ HTTPS...');
      const isHTTPS = location.protocol === 'https:';
      addResult('HTTPS иҝһжҺҘ', isHTTPS ? 'pass' : 'fail',
        isHTTPS ? 'дҪҝз”Ё HTTPSпјҲжӯЈзЎ®пјү' : 'жңӘдҪҝз”Ё HTTPSпјҲWebXR йңҖиҰҒ HTTPSпјү');
      log(`   ${isHTTPS ? 'вң…' : 'вқҢ'} Protocol: ${location.protocol}`);

      // жөӢиҜ• 4: еұҸе№•ж–№еҗ‘
      log('\n4пёҸвғЈ  жЈҖжөӢеұҸе№•ж–№еҗ‘...');
      const isPortrait = window.innerHeight > window.innerWidth;
      addResult('еұҸе№•ж–№еҗ‘', isPortrait ? 'pass' : 'pending',
        isPortrait ? 'з«–еұҸпјҲжҺЁиҚҗпјү' : 'жЁӘеұҸпјҲеҸҜз”ЁдҪҶдёҚжҺЁиҚҗпјү');
      log(`   ${isPortrait ? 'вң…' : 'вҡ пёҸ'}  ${isPortrait ? 'з«–еұҸ' : 'жЁӘеұҸ'} (${window.innerWidth}Г—${window.innerHeight})`);

      // жөӢиҜ• 5: з”ЁжҲ· Agent
      log('\n5пёҸвғЈ  жЈҖжөӢжөҸи§ҲеҷЁдҝЎжҒҜ...');
      const ua = navigator.userAgent;
      let browserName = 'Unknown';
      if (ua.includes('Chrome')) browserName = 'Chrome';
      else if (ua.includes('Safari')) browserName = 'Safari';
      else if (ua.includes('Firefox')) browserName = 'Firefox';

      addResult('жөҸи§ҲеҷЁ', 'pass', browserName);
      log(`   вң… Browser: ${browserName}`);

      // жөӢиҜ• 6: еҶ…еӯҳпјҲеҰӮжһңеҸҜз”Ёпјү
      log('\n6пёҸвғЈ  жЈҖжөӢи®ҫеӨҮеҶ…еӯҳ...');
      if (navigator.deviceMemory) {
        const memory = navigator.deviceMemory;
        const memoryOK = memory >= 4;
        addResult('и®ҫеӨҮеҶ…еӯҳ', memoryOK ? 'pass' : 'pending',
          `${memory}GB RAM ${memoryOK ? '(е……и¶і)' : '(еҸҜиғҪдёҚи¶і)'}`);
        log(`   ${memoryOK ? 'вң…' : 'вҡ пёҸ'}  Memory: ${memory}GB`);
      } else {
        addResult('и®ҫеӨҮеҶ…еӯҳ', 'pending', 'ж— жі•жЈҖжөӢ');
        log('   вҡ пёҸ  ж— жі•жЈҖжөӢеҶ…еӯҳ');
      }

      // жҖ»з»“
      log('\nвң… жөӢиҜ•е®ҢжҲҗпјҒ', 'success');
      if (hasWebXR && arSupported && isHTTPS) {
        log('\nрҹҺү дҪ зҡ„и®ҫеӨҮж”ҜжҢҒ AR еҠҹиғҪпјҒ', 'success');
        log('   иҜ·и®ҝй—®дё»зЁӢеәҸе№¶зӮ№еҮ» "рҹ“ұ AR йў„и§Ҳ" жҢүй’®', 'success');
      } else {
        log('\nвҡ пёҸ  дҪ зҡ„и®ҫеӨҮдёҚе®Ңе…Ёж”ҜжҢҒ AR', 'warn');
        log('   иҜ·жЈҖжҹҘдёҠиҝ°еӨұиҙҘзҡ„жөӢиҜ•йЎ№', 'warn');
      }
    };

    // жү“ејҖдё»зЁӢеәҸ
    window.openMainApp = function() {
      window.location.href = '/';
    };

    // йЎөйқўеҠ иҪҪж—¶иҮӘеҠЁиҝҗиЎҢжөӢиҜ•
    window.addEventListener('load', () => {
      log('йЎөйқўеҠ иҪҪе®ҢжҲҗпјҢеҮҶеӨҮжөӢиҜ•...\n');
      setTimeout(runAllTests, 500);
    });

    window.runAllTests = testWebXR;
  </script>
</body>
</html>
