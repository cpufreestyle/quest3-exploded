<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quest 3 模型 - 极简测试</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 15px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      max-width: 300px;
    }
    .success { color: #4caf50; }
    .error { color: #ff6b6b; }
    .warn { color: #ffc107; }
  </style>
</head>
<body>
  <div id="info">
    <div>状态: <span id="status">初始化...</span></div>
    <div id="details"></div>
  </div>

  <script type="module">
    import * as THREE from './vendor/three.module.js?v=1783166735';
    import { OrbitControls } from './vendor/OrbitControls.js?v=1783166735';

    // 动态导入 GLTFLoader
    let GLTFLoader = null;
    async function loadGLTFLoader() {
      if (!GLTFLoader) {
        const module = await import('./vendor/GLTFLoader.js?v=1783166735');
        GLTFLoader = module.GLTFLoader;
      }
      return GLTFLoader;
    }

    const statusEl = document.getElementById('status');
    const detailsEl = document.getElementById('details');

    function log(msg, type = '') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = msg;
      detailsEl.appendChild(div);
      console.log(msg);
    }

    try {
      statusEl.textContent = '创建场景...';

      // 场景
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);

      // 相机
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      // 渲染器
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // 控制器
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // 灯光
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 5, 5);
      scene.add(light);

      statusEl.textContent = '加载模型...';
      log('开始加载 Quest3.glb...', 'warn');

      // 加载模型 - 使用最简方式
      const LoaderClass = await loadGLTFLoader();
      const loader = new LoaderClass();
      loader.load(
        './models/Quest3.glb',
        (gltf) => {
          log('✅ 模型加载成功！', 'success');

          const model = gltf.scene;

          // 统计
          let meshCount = 0;
          let vertexCount = 0;

          model.traverse((child) => {
            if (child.isMesh) {
              meshCount++;
              if (child.geometry) {
                const pos = child.geometry.attributes.position;
                if (pos) vertexCount += pos.count;
              }
            }
          });

          log(`📊 部件数: ${meshCount}`);
          log(`📊 顶点数: ${vertexCount.toLocaleString()}`);

          // 居中
          const box = new THREE.Box3().setFromObject(model);
          const center = new THREE.Vector3();
          box.getCenter(center);
          model.position.sub(center);

          // 计算合适的相机距离
          const size = new THREE.Vector3();
          box.getSize(size);
          const maxDim = Math.max(size.x, size.y, size.z);
          const fov = camera.fov * Math.PI / 180;
          const distance = maxDim / (2 * Math.tan(fov / 2));

          camera.position.set(distance * 1.5, distance * 1, distance * 1.5);
          controls.target.set(0, 0, 0);
          controls.update();

          scene.add(model);

          statusEl.textContent = '✅ 完成';
          log('✨ 渲染器已启动', 'success');
          log('💡 使用鼠标旋转/缩放查看模型');

          // 渲染循环
          function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
          }
          animate();
        },
        (progress) => {
          if (progress.lengthComputable) {
            const percent = ((progress.loaded / progress.total) * 100).toFixed(1);
            statusEl.textContent = `加载中 ${percent}%`;
            if (progress.total) {
              const loadedMB = (progress.loaded / 1024 / 1024).toFixed(2);
              const totalMB = (progress.total / 1024 / 1024).toFixed(2);
              log(`📦 ${loadedMB} / ${totalMB} MB (${percent}%)`, 'warn');
            }
          } else {
            statusEl.textContent = `已加载 ${(progress.loaded / 1024 / 1024).toFixed(2)} MB`;
          }
        },
        (error) => {
          console.error('❌ 加载失败:', error);
          statusEl.textContent = '❌ 失败';
          log(`错误: ${error.message || error}`, 'error');
        }
      );

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      console.error('初始化失败:', err);
      statusEl.textContent = '❌ 初始化失败';
      log(`错误: ${err.message}`, 'error');
    }
  </script>
</body>
</html>
