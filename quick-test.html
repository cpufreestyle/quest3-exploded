<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest 3 模型快速测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0c12 0%, #1a1b23 100%);
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      max-width: 900px;
      width: 100%;
      backdrop-filter: blur(10px);
    }
    h1 {
      color: #4a9eff;
      margin-bottom: 20px;
      text-align: center;
    }
    .status {
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      border-left: 4px solid;
    }
    .status.pending {
      background: rgba(255, 193, 7, 0.1);
      border-color: #ffc107;
      color: #ffc107;
    }
    .status.success {
      background: rgba(76, 175, 80, 0.1);
      border-color: #4caf50;
      color: #4caf50;
    }
    .status.error {
      background: rgba(255, 107, 107, 0.1);
      border-color: #ff6b6b;
      color: #ff6b6b;
    }
    #canvas-wrapper {
      width: 100%;
      max-width: 800px;
      margin: 20px auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 2px solid rgba(74, 158, 255, 0.3);
    }
    canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
    }
    .controls {
      margin-top: 20px;
      text-align: center;
    }
    button {
      background: linear-gradient(135deg, #4a9eff 0%, #8f7aff 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      margin: 5px;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 158, 255, 0.4);
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }
    .info {
      background: rgba(74, 158, 255, 0.1);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Quest 3 模型快速测试</h1>

    <div id="status-http" class="status pending">
      ⏳ 步骤 1/4: 检查 HTTP 服务器...
    </div>

    <div id="status-fetch" class="status pending">
      ⏳ 步骤 2/4: 下载模型文件...
    </div>

    <div id="status-loader" class="status pending">
      ⏳ 步骤 3/4: 加载 GLTFLoader...
    </div>

    <div id="status-parse" class="status pending">
      ⏳ 步骤 4/4: 解析 GLB 文件...
    </div>

    <div id="canvas-wrapper" style="display: none;"></div>

    <div class="controls">
      <button id="load-btn" disabled>🚀 加载模型</button>
    </div>

    <div id="result" class="info" style="display: none;"></div>
  </div>

  <script type="module">
    import * as THREE from './vendor/three.module.js?v=1783166735';
    import { OrbitControls } from './vendor/OrbitControls.js?v=1783166735';

    // 动态导入 GLTFLoader
    let GLTFLoader = null;
    async function loadGLTFLoader() {
      if (!GLTFLoader) {
        console.log('📦 正在加载 GLTFLoader...');
        const module = await import('./vendor/GLTFLoader.js?v=1783166735');
        console.log('📦 Module 内容:', module);
        console.log('📦 GLTFLoader 类型:', typeof module.GLTFLoader);
        console.log('📦 GLTFLoader 值:', module.GLTFLoader);
        GLTFLoader = module.GLTFLoader;
        console.log('✅ GLTFLoader 已缓存');
      }
      return GLTFLoader;
    }

    const statusHttp = document.getElementById('status-http');
    const statusFetch = document.getElementById('status-fetch');
    const statusLoader = document.getElementById('status-loader');
    const statusParse = document.getElementById('status-parse');
    const loadBtn = document.getElementById('load-btn');
    const canvasWrapper = document.getElementById('canvas-wrapper');
    const result = document.getElementById('result');

    function setStatus(element, status, message) {
      element.className = `status ${status}`;
      element.innerHTML = message;
    }

    // 步骤 1: 检查 HTTP 服务器
    async function checkHttp() {
      try {
        const response = await fetch('./models/Quest3.glb', { method: 'HEAD' });
        if (response.ok) {
          const size = response.headers.get('Content-Length');
          setStatus(statusHttp, 'success', `✅ 步骤 1/4: HTTP 服务器正常 (模型大小: ${(size/1024/1024).toFixed(2)} MB)`);
          return true;
        } else {
          setStatus(statusHttp, 'error', `❌ 步骤 1/4: HTTP 错误 ${response.status}`);
          return false;
        }
      } catch (err) {
        setStatus(statusHttp, 'error', `❌ 步骤 1/4: ${err.message}`);
        return false;
      }
    }

    // 步骤 2: 下载模型（多种尝试方式）
    async function fetchModel() {
      const urls = [
        './models/Quest3.glb',
        '/Users/a1-6/quest3-exploded/models/Quest3.glb'  // 直接路径尝试
      ];

      for (const url of urls) {
        try {
          console.log(`📡 尝试下载: ${url}`);
          setStatus(statusFetch, 'pending', `⏳ 步骤 2/4: 正在尝试 ${url}...`);

          const response = await fetch(url, {
            method: 'GET',
            headers: {
              'Accept': 'model/gltf-binary, */*',
              'Cache-Control': 'no-cache'
            },
            cache: 'no-store'
          });

          console.log(`📡 Response:`, response.status, response.statusText);

          if (!response.ok) {
            console.warn(`⚠️ ${url} 失败: ${response.status}`);
            continue; // 尝试下一个 URL
          }

          console.log(`📡 开始读取数据...`);
          const buffer = await response.arrayBuffer();
          const sizeMB = (buffer.byteLength / 1024 / 1024).toFixed(2);
          console.log(`✅ 下载成功: ${sizeMB} MB`);

          setStatus(statusFetch, 'success', `✅ 步骤 2/4: 下载成功 (${sizeMB} MB)`);
          return buffer;

        } catch (err) {
          console.warn(`⚠️ ${url} 失败:`, err.message);
          continue; // 尝试下一个 URL
        }
      }

      // 所有 URL 都失败
      throw new Error('所有下载方式都失败。请检查网络连接或浏览器扩展（可能阻止了 fetch）。');
    }

    // 步骤 3: 加载 GLTFLoader
    async function prepareLoader() {
      try {
        const LoaderClass = await loadGLTFLoader();
        const loader = new LoaderClass();
        setStatus(statusLoader, 'success', `✅ 步骤 3/4: GLTFLoader 已就绪`);
        return loader;
      } catch (err) {
        setStatus(statusLoader, 'error', `❌ 步骤 3/4: ${err.message}`);
        throw err;
      }
    }

    // 步骤 4: 解析 GLB
    async function parseGLB(loaderClass, arrayBuffer) {
      try {
        console.log('🔍 Loader 类:', loaderClass);
        console.log('🔍 Loader 类型:', typeof loaderClass);
        console.log('🔍 是否是函数:', typeof loaderClass === 'function');

        // 尝试多种方式创建实例
        let loader;
        try {
          // 方式 1: new
          loader = new loaderClass();
          console.log('✅ 方式 1 成功: new loaderClass()');
        } catch (e) {
          console.log('⚠️ 方式 1 失败:', e.message);
          // 方式 2: 直接使用（如果是实例）
          loader = loaderClass;
          console.log('✅ 方式 2: 直接使用 loaderClass');
        }

        console.log('🔍 Loader 对象:', loader);
        console.log('🔍 Loader.parse 类型:', typeof loader?.parse);

        if (typeof loader.parse !== 'function') {
          throw new Error(`loader.parse 不是函数！类型: ${typeof loader.parse}`);
        }

        const gltf = await new Promise((resolve, reject) => {
          loader.parse(arrayBuffer, '', resolve, (err) => {
            reject(new Error(err?.message || String(err)));
          });
        });
        setStatus(statusParse, 'success', `✅ 步骤 4/4: 解析成功 (${gltf.scene.children.length} 个子对象)`);
        return gltf;
      } catch (err) {
        setStatus(statusParse, 'error', `❌ 步骤 4/4: ${err.message}`);
        throw err;
      }
    }

    // 主函数
    async function loadAndShow() {
      console.log('🚀 开始加载流程...');
      loadBtn.disabled = true;
      loadBtn.textContent = '⏳ 加载中...';

      try {
        console.log('📡 步骤 1: 检查 HTTP...');
        // 步骤 1
        const httpOk = await checkHttp();
        if (!httpOk) {
          console.log('❌ HTTP 检查失败');
          return;
        }

        // 步骤 2
        const arrayBuffer = await fetchModel();

        // 步骤 3
        const loader = await prepareLoader();

        // 步骤 4
        const gltf = await parseGLB(loader, arrayBuffer);

        // 显示模型
        canvasWrapper.style.display = 'block';
        result.style.display = 'block';
        loadBtn.textContent = '✅ 加载完成';

        showModel(gltf);

      } catch (err) {
        loadBtn.disabled = false;
        loadBtn.textContent = '🔄 重试';
        console.error('加载失败:', err);
      }
    }

    function showModel(gltf) {
      // 创建场景
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0c12);

      // 相机
      const camera = new THREE.PerspectiveCamera(45, 16/9, 0.1, 100);
      camera.position.set(3, 2, 3);

      // 渲染器
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(800, 450);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      canvasWrapper.appendChild(renderer.domElement);

      // 控制器
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 2.0;

      // 灯光
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      const dir = new THREE.DirectionalLight(0xffffff, 1);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      // 添加模型
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      box.getCenter(center);
      model.position.sub(center);
      scene.add(model);

      // 调整相机
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
      camera.position.set(dist * 1.5, dist * 1, dist * 1.5);
      controls.target.set(0, 0, 0);
      controls.update();

      // 统计
      let meshCount = 0;
      const materials = new Set();
      let textureCount = 0;
      gltf.scene.traverse((child) => {
        if (child.isMesh) {
          meshCount++;
          if (child.material) {
            materials.add(child.material.type);
            if (child.material.map) textureCount++;
          }
        }
      });

      result.innerHTML = `
        <strong style="color: #4a9eff;">📊 模型统计</strong><br>
        📦 部件数量: ${meshCount}<br>
        🎨 材质类型: ${Array.from(materials).join(', ')}<br>
        🖼️ 纹理贴图: ${textureCount}<br>
        📐 尺寸: ${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)}<br>
        <br>
        <em style="color: #888;">💡 拖动旋转 | 滚轮缩放 | 右键平移</em>
      `;

      // 动画循环
      function animate() {
        requestAnimationFrame(animate);
        model.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    }

    // 绑定按钮
    loadBtn.addEventListener('click', loadAndShow);

    // 自动开始
    setTimeout(loadAndShow, 500);
  </script>
</body>
</html>
