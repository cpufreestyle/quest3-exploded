<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型配置 - Quest 3 3D 拆解</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        
        select, input[type="text"], input[type="password"], input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        
        .radio-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .radio-item {
            flex: 1;
            min-width: 140px;
        }
        
        .radio-item input[type="radio"] {
            display: none;
        }
        
        .radio-item label {
            display: block;
            padding: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .radio-item label:hover {
            border-color: rgba(255,255,255,0.3);
        }
        
        .radio-item input[type="radio"]:checked + label {
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }
        
        .radio-item .provider-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .radio-item .provider-desc {
            font-size: 12px;
            color: #888;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-right: 12px;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }
        
        .status.success {
            background: rgba(34,197,94,0.2);
            border: 1px solid rgba(34,197,94,0.3);
            color: #4ade80;
            display: block;
        }
        
        .status.error {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            display: block;
        }
        
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
        
        .hidden {
            display: none;
        }
        
        .test-result {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 模型配置</h1>
        <p class="subtitle">配置 AI 模型以生成 3D 模型描述和 Blender Python 代码</p>
        
        <div class="card">
            <div class="card-title">
                <div class="icon">🤖</div>
                选择 AI 提供商
            </div>
            
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" name="provider" id="provider-openai" value="openai" checked>
                    <label for="provider-openai">
                        <div class="provider-name">OpenAI</div>
                        <div class="provider-desc">GPT-4 / GPT-3.5</div>
                    </label>
                </div>
                
                <div class="radio-item">
                    <input type="radio" name="provider" id="provider-anthropic" value="anthropic">
                    <label for="provider-anthropic">
                        <div class="provider-name">Anthropic</div>
                        <div class="provider-desc">Claude 3</div>
                    </label>
                </div>
                
                <div class="radio-item">
                    <input type="radio" name="provider" id="provider-ollama" value="ollama">
                    <label for="provider-ollama">
                        <div class="provider-name">Ollama</div>
                        <div class="provider-desc">本地模型</div>
                    </label>
                </div>
                
                <div class="radio-item">
                    <input type="radio" name="provider" id="provider-lmstudio" value="lmstudio">
                    <label for="provider-lmstudio">
                        <div class="provider-name">LM Studio</div>
                        <div class="provider-desc">本地模型</div>
                    </label>
                </div>
                
                <div class="radio-item">
                    <input type="radio" name="provider" id="provider-stepfun" value="stepfun">
                    <label for="provider-stepfun">
                        <div class="provider-name">StepFun</div>
                        <div class="provider-desc">阶跃星辰</div>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- OpenAI 配置 -->
        <div id="config-openai" class="card config-section">
            <div class="card-title">
                <div class="icon">🔑</div>
                OpenAI 配置
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="openai-key" placeholder="sk-...">
                <p class="help-text">从 <a href="https://platform.openai.com/api-keys" target="_blank">OpenAI Platform</a> 获取</p>
            </div>
            
            <div class="form-group">
                <label>模型</label>
                <select id="openai-model">
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="gpt-3.5-turbo" selected>GPT-3.5 Turbo</option>
                </select>
            </div>
        </div>
        
        <!-- Anthropic 配置 -->
        <div id="config-anthropic" class="card config-section hidden">
            <div class="card-title">
                <div class="icon">🔑</div>
                Anthropic 配置
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="anthropic-key" placeholder="sk-ant-...">
                <p class="help-text">从 <a href="https://console.anthropic.com/" target="_blank">Anthropic Console</a> 获取</p>
            </div>
            
            <div class="form-group">
                <label>模型</label>
                <select id="anthropic-model">
                    <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                    <option value="claude-3-sonnet-20240229" selected>Claude 3 Sonnet</option>
                    <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                </select>
            </div>
        </div>
        
        <!-- Ollama 配置 -->
        <div id="config-ollama" class="card config-section hidden">
            <div class="card-title">
                <div class="icon">🏠</div>
                Ollama 本地配置
            </div>
            
            <div class="form-group">
                <label>服务地址</label>
                <input type="url" id="ollama-url" value="http://localhost:11434">
            </div>
            
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="ollama-model" placeholder="llama2, codellama, mistral..." value="codellama">
                <p class="help-text">运行 <code>ollama list</code> 查看可用模型</p>
            </div>
        </div>
        
        <!-- LM Studio 配置 -->
        <div id="config-lmstudio" class="card config-section hidden">
            <div class="card-title">
                <div class="icon">🏠</div>
                LM Studio 本地配置
            </div>
            
            <div class="form-group">
                <label>API 地址</label>
                <input type="url" id="lmstudio-url" value="http://localhost:1234/v1">
                <p class="help-text">在 LM Studio 中开启 Local Server</p>
            </div>
            
            <div class="form-group">
                <label>模型名称（可选）</label>
                <input type="text" id="lmstudio-model" placeholder="留空使用默认模型">
            </div>
        </div>
        
        <!-- StepFun 配置 -->
        <div id="config-stepfun" class="card config-section hidden">
            <div class="card-title">
                <div class="icon">⭐</div>
                StepFun 配置
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="stepfun-key" placeholder="sk-...">
                <p class="help-text">从 <a href="https://platform.stepfun.com/" target="_blank">StepFun 平台</a> 获取</p>
            </div>
            
            <div class="form-group">
                <label>模型</label>
                <select id="stepfun-model">
                    <option value="step-1-8k" selected>step-1-8k</option>
                    <option value="step-1-32k">step-1-32k</option>
                    <option value="step-1-128k">step-1-128k</option>
                    <option value="step-1-flash">step-1-flash</option>
                </select>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <div class="icon">🧪</div>
                测试连接
            </div>
            
            <button class="btn btn-secondary" onclick="testConnection()">测试连接</button>
            <div id="test-result" class="test-result hidden"></div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        // 切换配置面板
        document.querySelectorAll('input[name="provider"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('.config-section').forEach(section => {
                    section.classList.add('hidden');
                });
                document.getElementById(`config-${e.target.value}`).classList.remove('hidden');
            });
        });
        
        // 加载保存的配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/ai-config');
                const config = await response.json();
                
                if (config.provider) {
                    document.querySelector(`input[value="${config.provider}"]`).checked = true;
                    document.getElementById(`config-${config.provider}`).classList.remove('hidden');
                    
                    // 填充配置
                    if (config.openai) {
                        document.getElementById('openai-key').value = config.openai.key || '';
                        document.getElementById('openai-model').value = config.openai.model || 'gpt-3.5-turbo';
                    }
                    if (config.anthropic) {
                        document.getElementById('anthropic-key').value = config.anthropic.key || '';
                        document.getElementById('anthropic-model').value = config.anthropic.model || 'claude-3-sonnet-20240229';
                    }
                    if (config.ollama) {
                        document.getElementById('ollama-url').value = config.ollama.url || 'http://localhost:11434';
                        document.getElementById('ollama-model').value = config.ollama.model || 'codellama';
                    }
                    if (config.lmstudio) {
                        document.getElementById('lmstudio-url').value = config.lmstudio.url || 'http://localhost:1234/v1';
                        document.getElementById('lmstudio-model').value = config.lmstudio.model || '';
                    }
                    if (config.stepfun) {
                        document.getElementById('stepfun-key').value = config.stepfun.key || '';
                        document.getElementById('stepfun-model').value = config.stepfun.model || 'step-1-8k';
                    }
                }
            } catch (err) {
                console.log('No saved config');
            }
        }
        
        // 保存配置
        async function saveConfig() {
            const provider = document.querySelector('input[name="provider"]:checked').value;
            
            const config = {
                provider: provider,
                openai: {
                    key: document.getElementById('openai-key').value,
                    model: document.getElementById('openai-model').value
                },
                anthropic: {
                    key: document.getElementById('anthropic-key').value,
                    model: document.getElementById('anthropic-model').value
                },
                ollama: {
                    url: document.getElementById('ollama-url').value,
                    model: document.getElementById('ollama-model').value
                },
                lmstudio: {
                    url: document.getElementById('lmstudio-url').value,
                    model: document.getElementById('lmstudio-model').value
                },
                stepfun: {
                    key: document.getElementById('stepfun-key').value,
                    model: document.getElementById('stepfun-model').value
                }
            };
            
            try {
                const response = await fetch('/api/ai-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                const result = await response.json();
                if (result.success) {
                    // 保存成功后刷新页面
                    window.location.href = window.location.pathname + '?saved=true';
                } else {
                    showStatus('保存失败: ' + result.error, false);
                }
            } catch (err) {
                showStatus('保存失败: ' + err.message, false);
            }
        }
        
        // 测试连接
        async function testConnection() {
            const resultDiv = document.getElementById('test-result');
            resultDiv.classList.remove('hidden');
            resultDiv.textContent = '测试中...';
            
            try {
                const response = await fetch('/api/ai-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: 'Hello, are you working?' })
                });
                
                const result = await response.json();
                resultDiv.textContent = JSON.stringify(result, null, 2);
            } catch (err) {
                resultDiv.textContent = '测试失败: ' + err.message;
            }
        }
        
        // 页面加载提示
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('saved') === 'true') {
                showStatus('配置已保存，页面已刷新', true);
                // 清除 URL 参数
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
        
        // 显示状态
        function showStatus(message, isSuccess) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => status.className = 'status', 3000);
        }
        
        // 页面加载时读取配置
        loadConfig();
    </script>
</body>
</html>
