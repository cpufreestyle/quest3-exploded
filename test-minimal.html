<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>GLTFLoader 最小测试</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1a1a2e;
      color: #e6e6e6;
    }
    .log {
      margin: 5px 0;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      font-size: 13px;
    }
    .success { color: #4caf50; }
    .error { color: #ff6b6b; }
    .warn { color: #ffc107; }
    button {
      background: #4a9eff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    pre {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🧪 GLTFLoader 最小测试</h1>

  <button id="test1">测试 1: 导入并检查</button>
  <button id="test2">测试 2: 创建实例</button>
  <button id="test3">测试 3: 完整流程</button>

  <div id="logs"></div>

  <script type="module">
    const logs = document.getElementById('logs');

    function log(msg, type = '') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      div.textContent = msg;
      logs.appendChild(div);
      console.log(msg);
    }

    // 测试 1: 导入并检查
    document.getElementById('test1').addEventListener('click', async () => {
      log('\n=== 测试 1: 导入 GLTFLoader ===', 'warn');

      try {
        log('正在 import...');
        const module = await import('./vendor/GLTFLoader.js');
        log(`✅ import 成功`);

        const GLTFLoader = module.GLTFLoader;
        log(`GLTFLoader 类型: ${typeof GLTFLoader}`);
        log(`GLTFLoader 值: ${GLTFLoader}`);
        log(`GLTFLoader.name: ${GLTFLoader.name}`);
        log(`是否是函数: ${typeof GLTFLoader === 'function'}`);

        // 检查原型方法
        const proto = Object.getOwnPropertyNames(GLTFLoader.prototype);
        log(`原型方法: ${proto.join(', ')}`);

        if (typeof GLTFLoader.prototype.parse === 'function') {
          log('✅ GLTFLoader.prototype.parse 存在');
        } else {
          log('❌ GLTFLoader.prototype.parse 不存在!', 'error');
        }

      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
        console.error(err);
      }
    });

    // 测试 2: 创建实例
    document.getElementById('test2').addEventListener('click', async () => {
      log('\n=== 测试 2: 创建实例 ===', 'warn');

      try {
        const module = await import('./vendor/GLTFLoader.js');
        const GLTFLoader = module.GLTFLoader;

        log('创建实例: new GLTFLoader()');
        const loader = new GLTFLoader();

        log(`✅ 实例创建成功`);
        log(`loader 类型: ${typeof loader}`);
        log(`loader.constructor.name: ${loader.constructor.name}`);
        log(`loader.parse 类型: ${typeof loader.parse}`);
        log(`loader.parse 值: ${loader.parse}`);

        if (typeof loader.parse === 'function') {
          log('✅ loader.parse 是函数!');
        } else {
          log('❌ loader.parse 不是函数!', 'error');
        }

      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
        console.error(err);
      }
    });

    // 测试 3: 完整流程
    document.getElementById('test3').addEventListener('click', async () => {
      log('\n=== 测试 3: 完整流程 ===', 'warn');

      try {
        // 1. 导入
        log('1️⃣  导入 GLTFLoader...');
        const module = await import('./vendor/GLTFLoader.js');
        const GLTFLoader = module.GLTFLoader;
        log(`   ✅ 导入成功: ${typeof GLTFLoader}`);

        // 2. 创建实例
        log('2️⃣  创建实例...');
        const loader = new GLTFLoader();
        log(`   ✅ 实例创建成功`);

        // 3. 检查 parse
        log('3️⃣  检查 parse 方法...');
        log(`   loader.parse: ${typeof loader.parse}`);
        log(`   loader.parse 值: ${loader.parse}`);

        if (typeof loader.parse !== 'function') {
          throw new Error(`loader.parse 不是函数! 类型: ${typeof loader.parse}`);
        }
        log(`   ✅ parse 方法存在`);

        // 4. 下载文件
        log('4️⃣  下载 Quest3.glb...');
        const response = await fetch('./models/Quest3.glb');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const arrayBuffer = await response.arrayBuffer();
        const sizeMB = (arrayBuffer.byteLength / 1024 / 1024).toFixed(2);
        log(`   ✅ 下载成功: ${sizeMB} MB`);

        // 5. 解析
        log('5️⃣  解析 GLB...');
        const gltf = await new Promise((resolve, reject) => {
          loader.parse(arrayBuffer, '', resolve, (err) => {
            reject(new Error(err?.message || String(err)));
          });
        });

        log(`   ✅ 解析成功!`, 'success');
        log(`   场景: ${gltf.scene.name || '未命名'}`);
        log(`   子对象: ${gltf.scene.children.length}`);

        // 统计
        let meshCount = 0;
        gltf.scene.traverse((child) => {
          if (child.isMesh) meshCount++;
        });
        log(`   网格: ${meshCount}`);

        log('\n🎉 所有测试通过!');

      } catch (err) {
        log(`\n❌ 失败: ${err.message}`, 'error');
        log(`   类型: ${err.constructor.name}`, 'error');
        console.error(err);
      }
    });

    // 自动运行测试 1
    setTimeout(() => {
      log('页面加载完成，自动运行测试 1...\n');
      document.getElementById('test1').click();
    }, 500);
  </script>
</body>
</html>
