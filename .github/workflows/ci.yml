name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint || true
        continue-on-error: true

      - name: Build
        run: npm run build || true
        continue-on-error: true

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Python
        run: |
          pip install ruff
          ruff check *.py --line-length 200 || true
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests/ -v || true
          fi
